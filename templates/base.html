<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Vehicle Counting{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/traffic_dashboard_style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

<header class="top-header" id="mainHeader">
    <div class="header-left">
        <h1>Hệ thống nhận diện & đếm lưu lượng giao thông</h1>
    </div>

    <nav class="header-nav" aria-label="Điều hướng">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Trang chủ</a>
        <a href="/dashboard" class="nav-link {% if request.path.startswith('/dashboard') %}active{% endif %}">Thống kê</a>
        <a href="/realtime" class="nav-link {% if request.path.startswith('/realtime') %}active{% endif %}">Realtime</a>
        <a href="/about" class="nav-link {% if request.path.startswith('/about') %}active{% endif %}">Giới thiệu</a>
    </nav>
</header>

<main class="container">
    {% block content %}{% endblock %}
</main>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const header = document.getElementById("mainHeader");
    window.addEventListener("scroll", function () {
        if (window.scrollY > 50) header.classList.add("shrink");
        else header.classList.remove("shrink");
    });
});
</script>

{% block scripts %}{% endblock %}
</body>
</html>
